# Hyprlock Configuration for HiDPI (2560x1600)

# General settings
general {
    disable_loading_bar = true
    hide_cursor = true
}

# Background
background {
    path = ~/.config/hypr/wallpapers/torii.jpg
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.7
}

# Input field - Scaled for HiDPI
input-field {
    monitor = 
    size = 400, 90
    outline_thickness = 5
    outer_color = rgba(255, 79, 39, 1.0) # @torii_orange
    inner_color = rgba(13, 15, 18, 0.6)  # @bg_dark with transparency
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text =  # No text
    hide_input = false
    check_color = rgba(184, 58, 27, 1.0) # @weathered_red
    fail_color = rgba(255, 0, 0, 1.0)
    fail_text = <b>Auth Failed!</b>
    capslock_color = rgba(232, 141, 103, 1.0) # @soft_amber
    position = 0, -100
    halign = center
    valign = center
}

# Time - Large for HiDPI
label {
    monitor = 
    text = cmd[update:1000] echo "$(date "+%H:%M:%S")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 120
    font_family = JetBrains Mono
    position = 0, 200
    halign = center
    valign = center
}

# Date - Scaled for HiDPI
label {
    monitor = 
    text = cmd[update:1000] echo "$(date "+%A, %d %B")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 40
    font_family = JetBrains Mono
    position = 0, 320
    halign = center
    valign = center
}
