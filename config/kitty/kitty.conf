# =====================================================================
# Font Configuration (JetBrains Mono Medium & Bold)
# =====================================================================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0 

# =====================================================================
# Cursor Customization (Underline Tracking & Animation Trails)
# =====================================================================
cursor_shape               underline
cursor_underline_thickness 2.5
cursor_blink_interval      0.4

# Native Cursor Trail Animation Settings
cursor_trail                 3
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 0

# Prevent Shell Integration from Overriding the Underline Shape
shell_integration          no-cursor

# =====================================================================
# Window Layout & Padding
# =====================================================================
window_padding_width    14
placement_strategy      center
confirm_os_window_close 0

# =====================================================================
# Color Scheme: Inari Vermilion x Gruvbox Dark Hard
# =====================================================================

# Pure Gruvbox Dark Hard Background
background            #1c1c1c
# Muted Stone / Soft Cream Text Base
foreground            #e2e2e9
selection_background  #3c3836
selection_foreground  #e2e2e9
url_color             #ff6b4a

# Active Cursor Tint
cursor                #ff4e20
cursor_text_color     #1c1c1c

# Terminal Color Palette (Gruvbox Hard Contrast Compliant)

# Black (Gruvbox Dark Tones)
color0  #282828
color8  #504945

# Red (Fushimi Inari Vermilion / Torii Gate Orange-Red)
color1  #ff4e20
color9  #ff6b4a

# Green (Muted Gruvbox / Stone Moss)
color2  #859900
color10 #98971a

# Yellow (Gruvbox Amber / Warm Lantern Glow)
color3  #d79921
color11 #fabd2f

# Blue (Cool Shadow Slate)
color4  #458588
color12 #83a598

# Magenta (Deep Crimson / Dark Cherry)
color5  #b16286
color13 #d3869b

# Cyan (Muted Turquoise Sky)
color6  #689d6a
color14 #8ec07c

# White (Clean Text / Polished Stone)
color7  #a89984
color15 #ebdbb2

# =====================================================================
# Performance & Rendering Tunings
# =====================================================================
repaint_delay    5
input_delay      1
sync_to_monitor  yes
