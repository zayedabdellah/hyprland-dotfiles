# Sanitized RetroArch appearance-only settings.
# ROMs, BIOS files, saves, states, cores, thumbnails, logs, caches, playlists,
# and all personal filesystem paths are intentionally excluded.

menu_driver = "ozone"
menu_dynamic_wallpaper_enable = "true"
menu_enable_widgets = "true"
menu_footer_opacity = "1.000000"
menu_framebuffer_opacity = "0.700000"
menu_header_opacity = "1.000000"
menu_linear_filter = "false"
menu_scale_factor = "1.000000"
menu_shader_pipeline = "2"
menu_show_advanced_settings = "true"
menu_show_configurations = "true"
menu_show_core_updater = "true"
ozone_collapse_sidebar = "false"
ozone_font = ""
ozone_font_scale = "0"
ozone_font_scale_factor_footer = "1.000000"
ozone_font_scale_factor_global = "1.000000"
ozone_font_scale_factor_label = "1.000000"
ozone_font_scale_factor_sidebar = "1.000000"
ozone_font_scale_factor_sublabel = "1.000000"
ozone_font_scale_factor_time = "1.000000"
ozone_font_scale_factor_title = "1.000000"
ozone_header_separator = "1"
ozone_menu_color_theme = "3"
ozone_padding_factor = "1.000000"
ozone_thumbnail_scale_factor = "1.000000"
rgui_menu_color_theme = "4"
video_driver = "vulkan"
video_font_enable = "true"
video_font_size = "32.000000"
video_fullscreen = "true"
video_scale = "3"
video_scale_integer = "false"
